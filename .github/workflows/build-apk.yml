name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tetris3000-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Get version from app
        id: get_version
        run: |
          if [ -f app/build.gradle.kts ]; then
            VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
            VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '\d+')
          elif [ -f app/build.gradle ]; then
            VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
            VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | grep -oP '\d+')
          fi
          echo "version_name=${VERSION_NAME:-1.0.0}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE:-1}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME:-1.0.0}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "Tetris3000 ${{ steps.get_version.outputs.tag }}"
          body: |
            ## 🚀 Tetris3000 ${{ steps.get_version.outputs.tag }}

            **Build automático** — APK gerado pelo GitHub Actions.

            ### Instalação
            1. Baixe o APK abaixo
            2. Ative "Instalar de fontes desconhecidas" se necessário
            3. Instale e jogue!

            ### Changelog
            Veja os commits em: \${{ github.server_url }}/\${{ github.repository }}/commits/main
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
